<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东经雨 | 小屋</title>
    <meta name="keywords" content="东经雨,博客">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --primary-color: #fb7299;
            --primary-light: #ffd1dc;
            --primary-dark: #d4517a;
            --accent-color: #23ade5;
            --accent-light: #7fdbff;
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --text-primary: #2c3e50;
            --shadow-sm: 0 2px 8px rgba(251, 114, 153, 0.08);
            --shadow-md: 0 4px 16px rgba(251, 114, 153, 0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg-primary);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }

        header {
            text-align: center;
            padding: 2.5rem 1rem;
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
            grid-column: 1 / -1;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        .profile-box {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary-light);
            object-fit: cover;
            margin: 0 auto 1.5rem;
            display: block;
        }

        .profile-info h2 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--primary-dark);
        }

        .profile-bio {
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-icon {
            font-size: 1.5rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.25rem;
        }

        .skills-section {
            margin-top: 1.5rem;
        }

        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .skill-tag {
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            color: var(--primary-dark);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-lg);
            font-size: 0.9rem;
            font-weight: 500;
            transition: transform 0.3s ease;
        }

        .skill-tag:hover {
            transform: translateY(-2px);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .social-link {
            color: var(--primary-dark);
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-3px);
        }

        .profile-details {
            margin-top: 1.5rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .detail-item i {
            color: var(--primary-color);
            width: 20px;
        }

        /* 博客内容区域样式 */
        .blog-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .filter-box {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 1rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .filter-button {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-button.selected {
            background: var(--primary-color);
            color: white;
        }

        .filter-button:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .blog-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .blog-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
        }

        .blog-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .blog-card:hover .blog-image img {
            transform: scale(1.05);
        }

        .blog-content {
            padding: 1.5rem;
        }

        .blog-content h3 {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .blog-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .blog-meta i {
            color: var(--primary-color);
        }

        .blog-excerpt {
            color: #666;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .blog-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .blog-tag {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-lg);
            font-size: 0.85rem;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 250px 1fr;
                padding: 1rem;
            }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .profile-box {
                position: static;
            }

            .blog-grid {
                grid-template-columns: 1fr;
            }
        }
* {
    box-sizing: border-box;
}

.skills-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
}

.skill {
    display: flex;
    flex-direction: column;
}

.skill span {
    font-weight: bold;
    margin-bottom: 8px;
    color: #333;
}

.progress-bar {
    width: 100%;
    background-color: #e0e0e0;
    border-radius: 12px;
    overflow: hidden;
    height: 30px;
    box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.15);
    position: relative;
}

.progress {
    height: 100%;
    background: linear-gradient(90deg, rgba(76, 175, 80, 0.8), rgba(129, 199, 132, 0.8), rgba(76, 175, 80, 0.8));
    background-size: 200% 100%;
    color: #fff;
    font-weight: bold;
    text-align: center;
    line-height: 30px;
    border-radius: 12px 0 0 12px;
    transition: width 0.5s ease-in-out;
    font-size: 0.9rem;
    animation: move-gradient 3s linear infinite;
}

/* 渐变移动效果 */
@keyframes move-gradient {
    0% {
        background-position: 0% 0%;
    }
    100% {
        background-position: 200% 0%;
    }
}


    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🌧️ 东经雨的小屋</h1>
            <p>用代码描绘梦想，用创意点亮生活喵～</p>
        </header>

        <aside class="profile-box">
            <img src="/img/头像.JPG" alt="东经雨头像" class="profile-image">
            <div class="profile-info">
                <h2>东经雨</h2>
                <p class="profile-bio">👋 热爱技术，专注创造，努力成为更好的开发者</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-code-branch"></i>
                    </div>
                    <div class="stat-value">12+</div>
                    <div class="stat-label">项目</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <div class="stat-value">4年+</div>
                    <div class="stat-label">开发经验</div>
                </div>
            </div>

            <div class="social-links">
                <a href="https://github.com/Dong-Jing-Yu" class="social-link" target="_blank">
                    <i class="fab fa-github"></i>
                </a>
                <a href="mailto:your.email@example.com" class="social-link">
                    <i class="fas fa-envelope"></i>
                </a>
                <a href="/rss.xml" class="social-link">
                    <i class="fas fa-rss"></i>
                </a>
            </div>

            <div class="skills-section">
                <h3>技术栈</h3>
                <div class="skills-grid">
                    <div class="skills-container">
                        <div class="skill">
                            <span>JavaScript</span>
                            <div class="progress-bar">
                                <div class="progress" style="width: 70%;">70%</div>
                            </div>
                        </div>
                        <div class="skill">
                            <span>Python</span>
                            <div class="progress-bar">
                                <div class="progress" style="width: 85%;">85%</div>
                            </div>
                        </div>
                        <div class="skill">
                            <span>HTML/CSS</span>
                            <div class="progress-bar">
                                <div class="progress" style="width: 90%;">90%</div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="profile-details">
                <div class="detail-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>苏州</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-briefcase"></i>
                    <span>全栈开发工程师</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-bullseye"></i>
                    <span>云原生架构师</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-heart"></i>
                    <span>编程、写作、探索新技术</span>
                </div>
            </div>
        </aside>
<main class="blog-container">
    <div class="filter-box">
        <button class="filter-button selected" data-filter="all">所有博客</button>
        <button class="filter-button" data-filter="技术">技术</button>
        <button class="filter-button" data-filter="生活">生活</button>
        <button class="filter-button" data-filter="旅行">旅行</button>

    <div class="blog-grid" id="blog-grid">
        <div class="blog-card" data-category="技术">
            <div class="blog-image">
                <img src="/images/gen-1731211136082968913_0.png" alt="Blog Image 1">
            </div>
            <div class="blog-content">
                <h3>技术博客标题</h3>
                <div class="blog-meta">
                    <i class="fas fa-calendar"></i><span>2023年8月20日</span>
                    <i class="fas fa-tag"></i><span>技术</span>
                </div>
                <p class="blog-excerpt">这里是一段简短的博客内容预览，介绍这篇博客的主要内容...</p>
                <div class="blog-tags">
                    <span class="blog-tag">JavaScript</span>
                    <span class="blog-tag">Web开发</span>
                </div>
            </div>
        </div>
        <!-- 更多博客卡片 -->
    </div>
</main>
    </div>
</body>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const filterButtons = document.querySelectorAll(".filter-button");
        const blogCards = document.querySelectorAll(".blog-card");

        filterButtons.forEach(button => {
            button.addEventListener("click", () => {
                const filter = button.getAttribute("data-filter");

                filterButtons.forEach(btn => btn.classList.remove("selected"));
                button.classList.add("selected");

                blogCards.forEach(card => {
                    if (filter === "all" || card.getAttribute("data-category") === filter) {
                        card.style.display = "block";
                    } else {
                        card.style.display = "none";
                    }
                });
            });
        });
    });
</script>
<script src="js/TagFilter.js"></script>

</html>
