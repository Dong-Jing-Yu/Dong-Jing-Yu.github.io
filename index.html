<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星界观测站</title>
    <link rel="icon" href="/img/logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/profile-card.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header id="hitokoto-header">
            <div class="typewriter-container">
                <h1 id="hitokoto-text" class="typewriter-text"></h1>
            </div>
            <p class="subtitle">
                <span id="hitokoto-from"></span>
                <span id="hitokoto-time" class="hitokoto-time"></span>
            </p>
        </header>

        <aside class="profile-box">
            <div class="avatar-container">
                <img src="/img/avatar.png" class="profile-image" alt="星际观察者">
                <div class="identity-field">
                    <h2>夜影观察员</h2>
                    <p class="stellar-title">量子架构工程师</p>
                    <div class="nebula-badge">VII级认证开发者</div>
                </div>
            </div>
        </aside>

        <main class="blog-container">
            <!-- 博客内容区 -->
        </main>
    </div>

    <script src="/js/hitokoto-title-animations.js"></script>
    <script src="/js/profile-widgets.js"></script>
</body>

</html>
