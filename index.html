<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东经雨 | 小屋</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #7c3AED;
            --primary-gradient: linear-gradient(135deg, #7c3AED 0%, #4F46E5 100%);
            --accent-color: #10B981;
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --text-primary: #E2E8F0;
            --text-secondary: #94A3B8;
            --border-color: rgba(255,255,255,0.1);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --radius-lg: 16px;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }

        header {
            background: var(--primary-gradient);
            border-radius: var(--radius-lg);
            padding: 3rem 2rem;
            margin-bottom: 2rem;
            grid-column: 1 / -1;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 2.8rem;
            background: linear-gradient(45deg, #fff 30%, #C4B5FD 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* 侧边栏样式 */
        .profile-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 2rem;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid;
            border-image: var(--primary-gradient) 1;
            margin-bottom: 1.5rem;
        }

        /* 霓虹进度条 */
        .progress {
            background: linear-gradient(90deg, 
                rgba(124,58,237,0.2) 0%,
                rgba(79,70,229,0.6) 50%,
                rgba(124,58,237,0.2) 100%);
            background-size: 200% 100%;
            animation: gradientFlow 3s linear infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 博客卡片 */
        .blog-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blog-card:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, 
                rgba(30,41,59,0.8) 0%,
                rgba(15,23,42,0.8) 100%);
        }

        /* 分类按钮 */
        .filter-button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .filter-button.selected {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
        }

        /* 夜间模式优化 */
        .blog-excerpt {
            color: var(--text-secondary);
        }

        .social-link {
            color: var(--text-primary);
            transition: color 0.3s ease;
        }

        .social-link:hover {
            color: var(--accent-color);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
            
            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🌌 夜影的维度</h1>
            <p>在代码与星光的交界处构建数字世界</p>
        </header>

        <aside class="profile-box">
            <img src="/img/avatar.png" class="profile-image">
            <h2>夜影</h2>
            <div class="skills-container">
                <div class="skill">
                    <span>TypeScript</span>
                    <div class="progress-bar">
                        <div class="progress" style="width: 85%;">85%</div>
                    </div>
                </div>
                <!-- 更多技能条 -->
            </div>
        </aside>

        <main class="blog-container">
            <div class="filter-box">
                <button class="filter-button selected">所有文章</button>
                <button class="filter-button">技术沉思</button>
                <button class="filter-button">数字美学</button>
            </div>
            
            <div class="blog-grid">
                <article class="blog-card">
                    <div class="blog-image">
                        <img src="/img/nebula.jpg" alt="星云封面">
                    </div>
                    <div class="blog-content">
                        <h3>WebGL 中的星云生成算法</h3>
                        <div class="blog-meta">
                            <time>2023.12.25</time>
                            <span class="tag">图形学</span>
                        </div>
                        <p class="blog-excerpt">探索如何通过粒子系统模拟宇宙星云的生成过程...</p>
                    </div>
                </article>
                <!-- 更多博客卡片 -->
            </div>
        </main>
    </div>
</body>
</html>
